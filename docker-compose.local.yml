version: "3.7"

services:
    telegram-bot-api:
        build:
            context: ../telegram-bot-api-docker
            dockerfile: Dockerfile.local-source
            additional_contexts:
                telegram-bot-api-src: ../telegram-bot-api
            args:
                nproc: "${TELEGRAM_BOT_API_BUILD_JOBS:-2}"
        image: telegram-bot-api:local
        environment:
            TELEGRAM_API_ID: "${TELEGRAM_API_ID}"
            TELEGRAM_API_HASH: "${TELEGRAM_API_HASH}"
            TELEGRAM_LOCAL: "${TELEGRAM_LOCAL}"
            # TELEGRAM_VERBOSITY: 3
        volumes:
            - ${BOT_API_DIR}:/var/lib/telegram-bot-api

    bot:
        build:
            context: .
            dockerfile: Dockerfile
        environment:
            LOCAL_BOT_API_URL: "http://telegram-bot-api:8081"
            BOT_API_DIR: "/var/lib/telegram-bot-api/"
            DOWNLOAD_TO_DIR: "./downloads/"
            BOT_TOKEN: "${BOT_TOKEN}"
            USER_ID: "${USER_ID}"
            CHAT_ID: "${CHAT_ID}"
            APP_SETTINGS_FILE: "/app/data/settings.json"
            SINGLE_FILE_GROUP_ENABLED: "${SINGLE_FILE_GROUP_ENABLED:-False}"
            SINGLE_FILE_GROUP_DELAY: "${SINGLE_FILE_GROUP_DELAY:-1.0}"
            DOWNLOAD_STATUS_UPDATE_INTERVAL: "${DOWNLOAD_STATUS_UPDATE_INTERVAL:-5.0}"
            MAX_CONCURRENT_DOWNLOADS: "${MAX_CONCURRENT_DOWNLOADS:-1}"
        volumes:
            - ${DOWNLOAD_TO_DIR}:/app/downloads
            - ${BOT_API_DIR}:/var/lib/telegram-bot-api
            - ./data:/app/data
        depends_on:
            - telegram-bot-api
