version: "3.7"

services:
    telegram-bot-api:
        build:
            context: https://github.com/Dedrimer/telegram-bot-api-docker.git#master
            dockerfile: Dockerfile
            args:
                TELEGRAM_BOT_API_VERSION: "${TELEGRAM_BOT_API_VERSION:-10.1.0}"
                TELEGRAM_BOT_API_REPOSITORY: "${TELEGRAM_BOT_API_REPOSITORY:-https://github.com/Dedrimer/telegram-bot-api.git}"
                TELEGRAM_BOT_API_REF: "${TELEGRAM_BOT_API_REF:-master}"
                nproc: "${TELEGRAM_BOT_API_BUILD_JOBS:-2}"
        image: "telegram-bot-api:${TELEGRAM_BOT_API_VERSION:-10.1.0}"
        environment:
            TELEGRAM_BOT_API_VERSION: "${TELEGRAM_BOT_API_VERSION:-10.1.0}"
            TELEGRAM_API_ID: "${TELEGRAM_API_ID}"
            TELEGRAM_API_HASH: "${TELEGRAM_API_HASH}"
            TELEGRAM_LOCAL: "${TELEGRAM_LOCAL}"
        volumes:
            - ${BOT_API_DIR}:/var/lib/telegram-bot-api
        restart: unless-stopped

    bot:
        build:
            context: https://github.com/Dedrimer/telegram-downloader.git#main
            dockerfile: Dockerfile
            args:
                TELEGRAM_DOWNLOADER_VERSION: "${TELEGRAM_DOWNLOADER_VERSION:-0.2.1}"
                TELEGRAM_BOT_API_VERSION: "${TELEGRAM_BOT_API_VERSION:-10.1.0}"
        image: "telegram-downloader:${TELEGRAM_DOWNLOADER_VERSION:-0.2.1}"
        environment:
            LOCAL_BOT_API_URL: "http://telegram-bot-api:8081"
            BOT_API_DIR: "/var/lib/telegram-bot-api/"
            DOWNLOAD_TO_DIR: "./downloads/"
            BOT_TOKEN: "${BOT_TOKEN}"
            USER_ID: "${USER_ID}"
            CHAT_ID: "${CHAT_ID}"
            TELEGRAM_DOWNLOADER_VERSION: "${TELEGRAM_DOWNLOADER_VERSION:-0.2.1}"
            TELEGRAM_BOT_API_VERSION: "${TELEGRAM_BOT_API_VERSION:-10.1.0}"
            APP_SETTINGS_FILE: "/app/data/settings.json"
            SINGLE_FILE_GROUP_ENABLED: "${SINGLE_FILE_GROUP_ENABLED:-False}"
            SINGLE_FILE_GROUP_DELAY: "${SINGLE_FILE_GROUP_DELAY:-1.0}"
            DOWNLOAD_STATUS_UPDATE_INTERVAL: "${DOWNLOAD_STATUS_UPDATE_INTERVAL:-5.0}"
            MAX_CONCURRENT_DOWNLOADS: "${MAX_CONCURRENT_DOWNLOADS:-1}"
        volumes:
            - ${DOWNLOAD_TO_DIR}:/app/downloads
            - ${BOT_API_DIR}:/var/lib/telegram-bot-api
            - ./data:/app/data
        depends_on:
            - telegram-bot-api
        restart: unless-stopped
