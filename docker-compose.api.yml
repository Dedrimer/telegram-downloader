# This file is used to run just the local telegram bot-api service
version: "3.7"

services:
    telegram-bot-api:
        build:
            context: ../telegram-bot-api-docker
            dockerfile: Dockerfile.local-source
            additional_contexts:
                telegram-bot-api-src: ../telegram-bot-api
            args:
                nproc: "${TELEGRAM_BOT_API_BUILD_JOBS:-2}"
        image: "telegram-bot-api:local"
        environment:
            TELEGRAM_API_ID: "${TELEGRAM_API_ID}"
            TELEGRAM_API_HASH: "${TELEGRAM_API_HASH}"
            TELEGRAM_LOCAL: "${TELEGRAM_LOCAL}"
            TELEGRAM_DOWNLOAD_DIR: "/app/downloads"
            TELEGRAM_WORK_DIR: "/app/downloads/.bot-api"
        volumes:
            - ${DOWNLOAD_TO_DIR}:/app/downloads
        ports:
            - 8081:8081
        env_file:
            - .env
